          - failed
          - inProgress
          - aborted
        resourceType:
          type: string
          enum:
          - property
          - action
          - event
        resourceName:
          type: string
        url:
          type: string
        estimatedTimeOfCompletion:
          type: string
          format: date-time
        expirationTime:
          type: string
          format: date-time
    retrieveByFileInputGroupHistories:
      type: object
      properties:
        dataId:
          type: string
    abortPrepareRetrieveDataByAsyncGroupHistories:
      type: object
      properties:
        dataId:
          type: string
    abortPrepareRetrieveDataByAsyncInputGroupHistories:
      type: object
      properties:
        dataId:
          type: string
    abortPrepareRetrieveDataByFileGroupHistories:
      type: object
      properties:
        dataId:
          type: string
    abortPrepareRetrieveDataByFileInputGroupHistories:
      type: object
      properties:
        dataId:
