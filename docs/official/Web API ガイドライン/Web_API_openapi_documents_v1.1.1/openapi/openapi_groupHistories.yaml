      description: '実行: 履歴データを取得する(Async)'
      parameters:
      - description: group history id
        name: groupHistoryID
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/retrieveByAsyncInputGroupHistories'
        required: true
      responses:
        '200':
