        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/groupHistories/{groupHistoryID}/actions/abortPrepareRetrieveDataByAsync:
    post:
      tags:
      - GroupHistories
      summary: 'Post: Abort a prepareRetrieveDataByAsync execution by async'
      operationId: postGroupHistoriesActionsAbortPrepareRetrieveDataByAsyncGroupHistories
      description: '実行: prepareRetrieveDataByAsync実⾏の中断(Async)'
      parameters:
      - description: group history id
        name: groupHistoryID
        in: path
        required: true
        schema:
