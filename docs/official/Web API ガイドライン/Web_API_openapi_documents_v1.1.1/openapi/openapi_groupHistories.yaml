        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/prepareRetrieveDataByFileInputGroupHistories'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/prepareRetrieveDataByFileGroupHistories'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/groupHistories/{groupHistoryID}/actions/retrieveByFile:
    post:
      tags:
      - GroupHistories
      summary: 'Post: Retrieve histories data by file'
      operationId: postGroupHistoriesActionsRetrieveByFileGroupHistories
      description: '実行: 履歴データを取得する(File)'
      parameters:
      - description: group history id
        name: groupHistoryID
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/retrieveByFileInputGroupHistories'
        required: true
