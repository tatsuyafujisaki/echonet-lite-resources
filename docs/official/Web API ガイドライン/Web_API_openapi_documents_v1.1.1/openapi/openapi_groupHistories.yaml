tags:
- name: GroupHistories
  description: tag for GroupHistories
security:
- api_key: []
paths:
  /elapi/v1/groupHistories/{groupHistoryID}/properties:
    get:
      tags:
      - GroupHistories
      summary: 'Get: properties'
      operationId: getGroupHistoriesPropertiesGroupHistories
      description: '取得: properties'
      parameters:
      - description: group history id
        name: groupHistoryID
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/propertiesGroupHistories'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/groupHistories/{groupHistoryID}/actions/prepareRetrieveDataBySync:
    post:
      tags:
      - GroupHistories
      summary: 'Post: Prepare data to retrieve by sync'
      operationId: postGroupHistoriesActionsPrepareRetrieveDataBySyncGroupHistories
      description: '実行: 取得用データの準備を指示する(Sync)'
      parameters:
      - description: group history id
        name: groupHistoryID
        in: path
        required: true
        schema:
