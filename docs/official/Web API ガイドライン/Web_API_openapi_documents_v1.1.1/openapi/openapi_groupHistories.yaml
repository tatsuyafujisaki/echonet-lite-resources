      - GroupHistories
      summary: 'Post: Abort a prepareRetrieveDataByFile execution by file'
      operationId: postGroupHistoriesActionsAbortPrepareRetrieveDataByFileGroupHistories
      description: '実行: prepareRetrieveDataByFile実⾏の中断(File)'
      parameters:
      - description: group history id
        name: groupHistoryID
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
