      description: '実行: groupHistory IDに対応するgroup ID一覧の取得'
      parameters:
      - description: group history id
        name: groupHistoryID
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getGroupIdGroupHistories'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesGroupHistories:
      description: propertiesGroupHistories
      type: object
      properties:
        descriptions:
          type: object
          properties:
            ja:
              type: string
            en:
              type: string
          description: '[ja: group historyの説明, en: explanation of group history] '
        resourceType:
          type: string
          enum:
          - property
          - action
          - event
          description: '[ja: リソースタイプ, en: resource type] '
        resourceName:
          type: string
          description: '[ja: リソース名, en: resource name] '
        timing:
          type: object
          properties:
            timingType:
              type: string
              enum:
              - onChange
              - interval
            intervalValue:
              type: number
            intervalUnit:
              type: string
              enum:
              - sec
              - min
              - hour
              - day
              - month
              - year
          description: '[ja: 複数機器履歴データの取得タイミング, en: timing to record group history
            data] '
        period:
          type: object
          properties:
            first:
              type: string
              format: date-time
            last:
              type: string
              format: date-time
            duration:
              type: object
              properties:
                value:
                  type: number
                  multipleOf: 1
          description: '[ja: 複数機器履歴データの取り扱い期間, en: period of time to keep group history
            data] '
        maxRequestDuration:
          type: object
          properties:
            value:
              type: number
              multipleOf: 1
          description: '[ja: 複数機器履歴データの取得可能な期間, en: maximum duration for which group
            history data can be retrieved] '
        maxRequestNumberOfDevices:
          type: number
          multipleOf: 1
          description: '[ja: 複数機器履歴データ取得可能な最大要求台数, en: maximum number of devices requested] '
        retrieveMethod:
          type: string
          enum:
          - sync
          - async
          - file
          description: '[ja: データ取得方法, en: method to retrieve group history data] '
        dataStructure:
          type: array
          items:
            type: string
            enum:
            - device
            - time
          description: '[ja: 複数機器履歴データの型, en: type of group history data] '
    descriptionsGroupHistories:
      description: '[ja: group historyの説明, en: explanation of group history]'
      type: object
      properties:
        descriptions:
          type: object
          properties:
            ja:
              type: string
            en:
              type: string
          description: '[ja: group historyの説明, en: explanation of group history] '
    resourceTypeGroupHistories:
      description: '[ja: リソースタイプ, en: resource type]'
      type: object
      properties:
        resourceType:
          type: string
          enum:
          - property
          - action
          - event
          description: '[ja: リソースタイプ, en: resource type] '
    resourceNameGroupHistories:
      description: '[ja: リソース名, en: resource name]'
      type: object
      properties:
        resourceName:
          type: string
          description: '[ja: リソース名, en: resource name] '
    timingGroupHistories:
      description: '[ja: 複数機器履歴データの取得タイミング, en: timing to record group history data]'
      type: object
      properties:
        timing:
          type: object
          properties:
            timingType:
              type: string
              enum:
              - onChange
              - interval
            intervalValue:
              type: number
            intervalUnit:
              type: string
              enum:
              - sec
              - min
              - hour
              - day
              - month
              - year
          description: '[ja: 複数機器履歴データの取得タイミング, en: timing to record group history
            data] '
    periodGroupHistories:
      description: '[ja: 複数機器履歴データの取り扱い期間, en: period of time to keep group history
        data]'
      type: object
      properties:
        period:
          type: object
          properties:
            first:
              type: string
              format: date-time
            last:
              type: string
              format: date-time
            duration:
              type: object
              properties:
                value:
                  type: number
                  multipleOf: 1
          description: '[ja: 複数機器履歴データの取り扱い期間, en: period of time to keep group history
            data] '
    maxRequestDurationGroupHistories:
      description: '[ja: 複数機器履歴データの取得可能な期間, en: maximum duration for which group history
        data can be retrieved]'
      type: object
      properties:
        maxRequestDuration:
          type: object
          properties:
            value:
              type: number
              multipleOf: 1
          description: '[ja: 複数機器履歴データの取得可能な期間, en: maximum duration for which group
            history data can be retrieved] '
    maxRequestNumberOfDevicesGroupHistories:
      description: '[ja: 複数機器履歴データ取得可能な最大要求台数, en: maximum number of devices requested]'
      type: object
      properties:
        maxRequestNumberOfDevices:
          type: number
          multipleOf: 1
          description: '[ja: 複数機器履歴データ取得可能な最大要求台数, en: maximum number of devices requested] '
    retrieveMethodGroupHistories:
      description: '[ja: データ取得方法, en: method to retrieve group history data]'
      type: object
      properties:
        retrieveMethod:
          type: string
          enum:
          - sync
          - async
          - file
          description: '[ja: データ取得方法, en: method to retrieve group history data] '
    dataStructureGroupHistories:
      description: '[ja: 複数機器履歴データの型, en: type of group history data]'
      type: object
      properties:
        dataStructure:
          type: array
          items:
            type: string
            enum:
            - device
            - time
          description: '[ja: 複数機器履歴データの型, en: type of group history data] '
    prepareRetrieveDataBySyncGroupHistories:
      type: object
      properties:
        dataId:
          type: string
        count:
          type: number
          minimum: 0
          multipleOf: 1
        countPerPage:
          type: number
          minimum: 1
          multipleOf: 1
        expirationTime:
          type: string
          format: date-time
    prepareRetrieveDataBySyncInputGroupHistories:
      type: object
      properties:
        groupId:
          type: array
          items:
            type: string
        deviceId:
          type: array
          items:
            type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        dataStructure:
          type: string
          enum:
          - device
          - time
    retrieveBySyncGroupHistories:
      type: object
      properties:
        processStatus:
          type: string
          enum:
          - succeeded
          - failed
        resourceType:
          type: string
          enum:
          - property
          - action
          - event
        resourceName:
          type: string
        expirationTime:
          type: string
          format: date-time
        data:
          oneOf:
          - type: array
            items:
              type: object
              properties:
                deviceId:
                  type: string
                deviceData:
                  type: array
                  items:
                    type: object
                    properties:
                      time:
                        type: string
                        format: date-time
                      value:
                        type:
                        - string
                        - number
                        - boolean
                        - object
                        - array
          - type: array
            items:
              type: object
              properties:
                time:
                  type: string
                  format: date-time
                deviceId:
                  type: string
                value:
                  type:
                  - string
                  - number
                  - boolean
                  - object
                  - array
    retrieveBySyncInputGroupHistories:
      type: object
      properties:
        dataId:
          type: string
        page:
          type: number
          minimum: 1
          multipleOf: 1
    prepareRetrieveDataByAsyncGroupHistories:
      type: object
      properties:
        dataId:
          type: string
        estimatedTimeOfCompletion:
          type: string
          format: date-time
        expirationTime:
          type: string
          format: date-time
    prepareRetrieveDataByAsyncInputGroupHistories:
      type: object
      properties:
        groupId:
          type: array
          items:
            type: string
        deviceId:
          type: array
          items:
            type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        dataStructure:
          type: string
          enum:
          - device
          - time
    inquireByAsyncGroupHistories:
      type: object
      properties:
        processStatus:
          type: string
          enum:
          - succeeded
          - failed
          - inProgress
          - aborted
        count:
          type: number
          multipleOf: 1
        countPerPage:
          type: number
          multipleOf: 1
        estimatedTimeOfCompletion:
          type: string
          format: date-time
        expirationTime:
          type: string
          format: date-time
    inquireByAsyncInputGroupHistories:
      type: object
      properties:
        dataId:
          type: string
    retrieveByAsyncGroupHistories:
      type: object
      properties:
        processStatus:
          type: string
          enum:
          - succeeded
          - failed
          - inProgress
          - aborted
        resourceType:
          type: string
          enum:
          - property
          - action
          - event
        resourceName:
          type: string
        expirationTime:
          type: string
          format: date-time
        data:
          oneOf:
          - type: array
            items:
              type: object
              properties:
                deviceId:
                  type: string
                deviceData:
                  type: array
                  items:
                    type: object
                    properties:
                      time:
                        type: string
                        format: date-time
                      value:
                        type:
                        - string
                        - number
                        - boolean
                        - object
                        - array
          - type: array
            items:
              type: object
              properties:
                time:
                  type: string
                  format: date-time
                deviceId:
                  type: string
                value:
                  type:
                  - string
                  - number
                  - boolean
                  - object
                  - array
    retrieveByAsyncInputGroupHistories:
      type: object
      properties:
        dataId:
          type: string
        page:
          type: number
          minimum: 1
          multipleOf: 1
    prepareRetrieveDataByFileGroupHistories:
      type: object
      properties:
        dataId:
          type: string
        estimatedTimeOfCompletion:
          type: string
          format: date-time
        expirationTime:
          type: string
          format: date-time
    prepareRetrieveDataByFileInputGroupHistories:
      type: object
      properties:
        groupId:
          type: array
          items:
            type: string
        deviceId:
          type: array
          items:
            type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        dataStructure:
          type: string
