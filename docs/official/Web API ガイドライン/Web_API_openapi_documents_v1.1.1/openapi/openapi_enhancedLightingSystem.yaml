        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sceneIdEnhancedLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
      - EnhancedLightingSystem
      summary: 'Set: Scene control setting'
      operationId: putDevicesPropertiesSceneIdEnhancedLightingSystem
      description: '設定: シーン制御設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sceneIdEnhancedLightingSystem'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sceneIdEnhancedLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/maximumNumberOfSceneId:
    get:
      tags:
      - EnhancedLightingSystem
      summary: 'Get: Number that can assign scene control setting.'
      operationId: getDevicesPropertiesMaximumNumberOfSceneIdEnhancedLightingSystem
      description: '取得: シーン制御設定可能数'
      parameters:
      - description: device id
