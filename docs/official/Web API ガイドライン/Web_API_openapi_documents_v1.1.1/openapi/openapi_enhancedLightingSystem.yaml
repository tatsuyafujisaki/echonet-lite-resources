      tags:
      - EnhancedLightingSystem
      summary: 'Get: Possible power savings'
      operationId: getDevicesPropertiesPowerConsumptionWillBeSavedEnhancedLightingSystem
      description: '取得: 節電可能消費電力'
      parameters:
      - description: device id
        name: device_id
