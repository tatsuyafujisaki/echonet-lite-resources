    put:
      tags:
      - EnhancedLightingSystem
      summary: 'Set: Light level setting'
      operationId: putDevicesPropertiesLightLevelEnhancedLightingSystem
      description: '設定: 照明の明るさ設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lightLevelEnhancedLightingSystem'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lightLevelEnhancedLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/sceneId:
    get:
      tags:
      - EnhancedLightingSystem
      summary: 'Get: Scene control setting'
      operationId: getDevicesPropertiesSceneIdEnhancedLightingSystem
      description: '取得: シーン制御設定'
      parameters:
      - description: device id
        name: device_id
