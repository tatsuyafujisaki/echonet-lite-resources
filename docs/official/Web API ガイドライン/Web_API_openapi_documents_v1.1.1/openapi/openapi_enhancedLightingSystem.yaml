components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesEnhancedLightingSystem:
      description: propertiesEnhancedLightingSystem
      type: object
      properties:
        lightLevel:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 照明の明るさ設定, en: Light level setting] '
        sceneId:
          oneOf:
          - type: number
            minimum: 1
            maximum: 253
          - type: string
            enum:
            - noSetting
            description: '_noSetting (ja: 設定なし, en: No setting) '
          description: '[ja: シーン制御設定, en: Scene control setting] '
        maximumNumberOfSceneId:
          type: number
          minimum: 1
          maximum: 253
          description: '[ja: シーン制御設定可能数, en: Number that can assign scene control
            setting.] '
        powerConsumptionRateList:
          type: array
          minItems: 1
          maxItems: 253
          items:
            oneOf:
            - type: number
              minimum: 0
              maximum: 100
            - type: string
              enum:
              - unknown
              description: '_unknown (ja: 不明, en: Unknown) '
          description: '[ja: 電力消費率リスト, en: Power consumption rate list] '
        powerConsumptionAtFullLighting:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 全灯時消費電力, en: Power consumption when fully lighted] '
        powerConsumptionWillBeSaved:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 節電可能消費電力, en: Possible power savings] '
        powerConsumptionLimit:
          oneOf:
          - type: number
            minimum: 0
            maximum: 65533
          - type: string
            enum:
            - cancel
            description: '_cancel (ja: 電力制限解除, en: Canceling power consumption restriction) '
          description: '[ja: 消費電力制限設定, en: Power consumption limit setting] '
        automaticOperationControlling:
          type: boolean
          description: '[ja: 自動動作制御設定, en: Automatic operation controlling setting]
            _True (ja: ON, en: ON) False (ja: OFF, en: OFF) '
        fadingControlChangeTime:
          type: number
          minimum: 0
          maximum: 3600
          description: '[ja: フェード制御変化時間設定, en: Fading control change time setting] '
    lightLevelEnhancedLightingSystem:
      description: '[ja: 照明の明るさ設定, en: Light level setting]'
      type: object
      properties:
        lightLevel:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 照明の明るさ設定, en: Light level setting] '
    sceneIdEnhancedLightingSystem:
      description: '[ja: シーン制御設定, en: Scene control setting]'
      type: object
      properties:
        sceneId:
          oneOf:
          - type: number
            minimum: 1
            maximum: 253
          - type: string
            enum:
            - noSetting
            description: '_noSetting (ja: 設定なし, en: No setting) '
          description: '[ja: シーン制御設定, en: Scene control setting] '
    maximumNumberOfSceneIdEnhancedLightingSystem:
      description: '[ja: シーン制御設定可能数, en: Number that can assign scene control setting.]'
      type: object
      properties:
        maximumNumberOfSceneId:
          type: number
          minimum: 1
          maximum: 253
          description: '[ja: シーン制御設定可能数, en: Number that can assign scene control
            setting.] '
    powerConsumptionRateListEnhancedLightingSystem:
      description: '[ja: 電力消費率リスト, en: Power consumption rate list]'
      type: object
      properties:
        powerConsumptionRateList:
          type: array
          minItems: 1
          maxItems: 253
          items:
            oneOf:
            - type: number
              minimum: 0
              maximum: 100
            - type: string
              enum:
              - unknown
              description: '_unknown (ja: 不明, en: Unknown) '
          description: '[ja: 電力消費率リスト, en: Power consumption rate list] '
    powerConsumptionAtFullLightingEnhancedLightingSystem:
      description: '[ja: 全灯時消費電力, en: Power consumption when fully lighted]'
      type: object
      properties:
        powerConsumptionAtFullLighting:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 全灯時消費電力, en: Power consumption when fully lighted] '
    powerConsumptionWillBeSavedEnhancedLightingSystem:
      description: '[ja: 節電可能消費電力, en: Possible power savings]'
      type: object
      properties:
        powerConsumptionWillBeSaved:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 節電可能消費電力, en: Possible power savings] '
    powerConsumptionLimitEnhancedLightingSystem:
      description: '[ja: 消費電力制限設定, en: Power consumption limit setting]'
      type: object
      properties:
        powerConsumptionLimit:
          oneOf:
          - type: number
            minimum: 0
            maximum: 65533
          - type: string
            enum:
            - cancel
            description: '_cancel (ja: 電力制限解除, en: Canceling power consumption restriction) '
          description: '[ja: 消費電力制限設定, en: Power consumption limit setting] '
    automaticOperationControllingEnhancedLightingSystem:
      description: '[ja: 自動動作制御設定, en: Automatic operation controlling setting]'
      type: object
      properties:
        automaticOperationControlling:
          type: boolean
          description: '[ja: 自動動作制御設定, en: Automatic operation controlling setting]
            _True (ja: ON, en: ON) False (ja: OFF, en: OFF) '
    fadingControlChangeTimeEnhancedLightingSystem:
      description: '[ja: フェード制御変化時間設定, en: Fading control change time setting]'
      type: object
      properties:
        fadingControlChangeTime:
          type: number
          minimum: 0
          maximum: 3600
          description: '[ja: フェード制御変化時間設定, en: Fading control change time setting] '
  requestBodies: {}
  responses:
    Unauthorized:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    api_key:
      type: apiKey
      in: header
      name: X-Elapi-key
