    put:
      tags:
      - EnhancedLightingSystem
      summary: 'Set: Automatic operation controlling setting'
      operationId: putDevicesPropertiesAutomaticOperationControllingEnhancedLightingSystem
      description: '設定: 自動動作制御設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/automaticOperationControllingEnhancedLightingSystem'
        required: true
      responses:
