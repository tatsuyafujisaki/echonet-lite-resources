      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/maximumNumberOfSceneIdEnhancedLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/powerConsumptionRateList:
    get:
      tags:
      - EnhancedLightingSystem
      summary: 'Get: Power consumption rate list'
      operationId: getDevicesPropertiesPowerConsumptionRateListEnhancedLightingSystem
      description: '取得: 電力消費率リスト'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/powerConsumptionRateListEnhancedLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/powerConsumptionAtFullLighting:
    get:
      tags:
      - EnhancedLightingSystem
      summary: 'Get: Power consumption when fully lighted'
      operationId: getDevicesPropertiesPowerConsumptionAtFullLightingEnhancedLightingSystem
