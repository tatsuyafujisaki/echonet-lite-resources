  /elapi/v1/devices/{device_id}/properties/powerConsumptionLimit:
    get:
      tags:
      - EnhancedLightingSystem
      summary: 'Get: Power consumption limit setting'
      operationId: getDevicesPropertiesPowerConsumptionLimitEnhancedLightingSystem
      description: '取得: 消費電力制限設定'
      parameters:
      - description: device id
        name: device_id
