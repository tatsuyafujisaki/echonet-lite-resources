      summary: 'Get: Automatic operation controlling setting'
      operationId: getDevicesPropertiesAutomaticOperationControllingEnhancedLightingSystem
      description: '取得: 自動動作制御設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/automaticOperationControllingEnhancedLightingSystem'
        '401':
