        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/fadingControlChangeTime:
    get:
      tags:
      - EnhancedLightingSystem
      summary: 'Get: Fading control change time setting'
      operationId: getDevicesPropertiesFadingControlChangeTimeEnhancedLightingSystem
      description: '取得: フェード制御変化時間設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/fadingControlChangeTimeEnhancedLightingSystem'
        '401':
