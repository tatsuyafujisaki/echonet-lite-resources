components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesElectricBlindShade:
      description: propertiesElectricBlindShade
      type: object
      properties:
        faultDescription:
          type: string
          enum:
          - noFault
          - trunOffOrUnplug
          - resetButton
          - setIncorrectly
          - supply
          - cleaning
          - changingBattery
          - userDefinable1
          - abnormalEventOrSafety
          - switch
          - sensorSystem
          - component
          - controlCircuitBoard
          - userDefinable2
          - fault
          - obstacleCaught
          - outageRecovery
          - timeOut
          - batteryLow
          description: '[ja: 異常内容(復帰可能な異常), en: Fault description (Recoverable faults)]
            _noFault (ja: 異常なし, en: No fault) trunOffOrUnplug (ja: スイッチを切る/コンセントを抜き再操作,
            en: Faults that can be recovered from by turn off the power or unplug
            and reoperate.) resetButton (ja: リセットボタンを押し再操作, en: Faults that can be
