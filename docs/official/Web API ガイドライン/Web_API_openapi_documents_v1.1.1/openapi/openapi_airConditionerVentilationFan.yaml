components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesAirConditionerVentilationFan:
      description: propertiesAirConditionerVentilationFan
      type: object
      properties:
        airFlowLevel:
          oneOf:
          - type: number
            minimum: 1
            maximum: 8
            multipleOf: 1
          - type: string
            enum:
            - auto
            description: '_auto (ja: 換気風量自動状態, en: Ventilation air flow rate auto
              status) '
          description: '[ja: 換気風量設定, en: Set value of ventilation air flow rate] '
        ventilationModeAuto:
          type: boolean
          description: '[ja: 換気モード自動設定, en: Ventilation mode automatic setting] _True
            (ja: AUTO, en: Auto) False (ja: 非AUTO, en: Non-auto) '
        ventilationMethod:
          type: string
          enum:
          - blowing
          - airConditioning
          description: '[ja: 換気方式設定, en: Ventilation method setting] _blowing (ja:
            送風換気, en: Blowing ventilation) airConditioning (ja: 空調換気, en: Air conditioning
            ventilation) '
        ventilationMode:
          type: string
          enum:
          - normal
          - heatExchange
          - cooling
          - heating
          - dehumidifying
          - humidifying
          - other
          description: '[ja: 換気モード設定, en: Ventilation mode setting] _normal (ja: 普通換気,
            en: Normal ventilation) heatExchange (ja: 熱交換換気, en: Heat exchange ventilation)
            cooling (ja: 冷房換気, en: Cooling ventilation) heating (ja: 暖房換気, en: Heating
            ventilation) dehumidifying (ja: 除湿換気, en: Dehumidifying ventilation) humidifying
            (ja: 加湿換気, en: Humidifying ventilation) other (ja: その他換気, en: Other ventilation
            modes) '
        highlowLevel:
          type: number
          minimum: 1
          maximum: 8
          multipleOf: 1
          description: '[ja: 冷暖強弱設定, en: Cooling / heating high-low setting] '
        targetHumidity:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 室内相対湿度設定値, en: Set value of room relative humidity] '
        currentConsumption:
          type: number
          minimum: 0
          maximum: 6553.3
          multipleOf: 0.1
          description: '[ja: 消費電流計測値, en: Measured value of electric current consumption] '
        humidity:
          oneOf:
          - type: number
            minimum: 0
            maximum: 100
          - type: string
            enum:
