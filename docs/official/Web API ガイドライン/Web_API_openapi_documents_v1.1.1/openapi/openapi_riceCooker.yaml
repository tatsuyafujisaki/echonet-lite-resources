        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
      - RiceCooker
      summary: 'Set: Rice cooking reservation relative time setting'
      operationId: putDevicesPropertiesReservationRelativeTimeRiceCooker
      description: '設定: 炊飯予約設定相対時間設定値'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/reservationRelativeTimeRiceCooker'
        required: true
      responses:
        '200':
