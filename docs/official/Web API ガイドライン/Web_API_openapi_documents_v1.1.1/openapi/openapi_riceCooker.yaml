  /elapi/v1/devices/{device_id}/properties/coverStatus:
    get:
      tags:
      - RiceCooker
      summary: 'Get: Cover closure status'
      operationId: getDevicesPropertiesCoverStatusRiceCooker
      description: '取得: 蓋開閉状態'
      parameters:
      - description: device id
        name: device_id
