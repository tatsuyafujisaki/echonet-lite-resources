components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesBidirHvSmartElectricEnergyMeter:
      description: propertiesBidirHvSmartElectricEnergyMeter
      type: object
      properties:
        routeBId:
          type: string
          description: '[ja: Bルート識別番号, en: Route B Identification number] '
        monthlyMaximumElectricPowerDemand:
          type: object
          properties:
            normalDirection:
              oneOf:
              - type: number
                minimum: 0
              - type: string
                enum:
                - noData
                description: '_noData (ja: 未計測, en: Not measured) '
              description: '[ja: 正方向, en: Normal direction] _'
            reverseDirection:
              oneOf:
              - type: number
                minimum: 0
              - type: string
                enum:
                - noData
                description: '_noData (ja: 未計測, en: Not measured) '
              description: '[ja: 逆方向, en: Reverse direction] _'
          description: '[ja: 月間最大需要電力(正方向、逆方向計測値), en: Monthly maximum electric power
            demand (normal and reverse directions)] '
        cumulativeMaximumElectricPowerDemand:
          type: object
          properties:
            normalDirection:
              oneOf:
              - type: number
                minimum: 0
              - type: string
                enum:
                - noData
                description: '_noData (ja: 未計測, en: Not measured) '
              description: '[ja: 正方向, en: Normal direction] _'
            reverseDirection:
              oneOf:
              - type: number
                minimum: 0
              - type: string
                enum:
