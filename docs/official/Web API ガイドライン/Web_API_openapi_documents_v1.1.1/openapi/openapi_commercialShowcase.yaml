components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesCommercialShowcase:
      description: propertiesCommercialShowcase
      type: object
      properties:
        operationMode:
          type: string
          enum:
          - cooling
          - nonCooling
          - defrosting
          - other
          description: '[ja: 運転モード設定, en: Operation mode setting] _cooling (ja: 冷却,
            en: Cooling) nonCooling (ja: 非冷, en: Non-cooling) defrosting (ja: 霜取り,
            en: Defrosting) other (ja: その他, en: Others) '
        dischargeTemperature:
          type: number
          minimum: -127
          maximum: 125
          multipleOf: 1
          description: '[ja: 吐出温度計測値, en: Used to acquire measurements of discharge
            temperature.] '
        groupInformation:
          oneOf:
          - type: number
            minimum: 1
            maximum: 253
          - type: string
            enum:
            - none
            description: '_none (ja: 設定なし, en: None) '
          description: '[ja: グループ情報, en: Group information] '
        showcaseType:
          type: string
          enum:
          - nonFluorocarbonInverter
          - inverter
          - other
          description: '[ja: ショーケースタイプ情報, en: This property indicates the type of
            the showcase.] _nonFluorocarbonInverter (ja: ノンフロンインバータ (CO2), en: Non-fluorocarbon
            inverter (CO2)) inverter (ja: インバータ, en: Inverter) other (ja: その他, en:
            Other) '
        doorType:
          type: string
          enum:
          - open
          - closed
          description: '[ja: ドアタイプ情報, en: This property indicates the type of the
            showcase door.] _open (ja: オープン, en: Open) closed (ja: クローズ, en: Closed) '
        refrigeratorType:
          type: string
          enum:
          - separate
          - builtIn
          description: '[ja: 冷凍機内蔵型か冷凍機別置型かを示すショーケース構成情報, en: This property indicates
            refrigerator type, such as built-in or separate.] _separate (ja: 別置型,
            en: Separate type) builtIn (ja: 内蔵型, en: Built-in type) '
        shapeType:
          type: string
