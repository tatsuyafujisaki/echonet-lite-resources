components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesElectricRainDoor:
      description: propertiesElectricRainDoor
      type: object
      properties:
        faultDescription:
          type: string
          enum:
          - noFault
          - trunOffOrUnplug
          - resetButton
          - setIncorrectly
          - supply
          - cleaning
          - changingBattery
          - userDefinable1
          - abnormalEventOrSafety
          - switch
          - sensorSystem
          - component
          - controlCircuitBoard
          - userDefinable2
          - fault
          - obstacleCaught
          - outageRecovery
          - timeOut
          - batteryLow
          description: '[ja: 異常内容(復帰可能な異常), en: Fault description (Recoverable faults)]
            _noFault (ja: 異常なし, en: No fault) trunOffOrUnplug (ja: スイッチを切る/コンセントを抜き再操作,
            en: Faults that can be recovered from by turn off the power or unplug
            and reoperate.) resetButton (ja: リセットボタンを押し再操作, en: Faults that can be
            recovered from by pressing the reset button.) setIncorrectly (ja: セット不良,
            en: Device set incorrectly) supply (ja: 補給, en: Supply) cleaning (ja:
            掃除（フィルタ等）, en: Cleaning (filters, etc.)) changingBattery (ja: 電池交換, en:
            Changing the battery) userDefinable1 (ja: ユーザ定義領域1, en: User-definable
            domain 1) abnormalEventOrSafety (ja: 異常現象／安全装置作動, en: Abnormal event or
            the tripping of a safety device.) switch (ja: スイッチ異常, en: Fault in a switch.)
            sensorSystem (ja: センサ異常, en: Fault in the sensor system) component (ja:
            機能部品異常, en: Fault in a component such as an actuator.) controlCircuitBoard
            (ja: 制御基板異常, en: Fault in a control circuit board.) userDefinable2 (ja:
            ユーザ定義領域2, en: User-definable domain 2) fault (ja: 異常あり, en: Fault) obstacleCaught
            (ja: 障害物挟込み, en: Obstacle caught) outageRecovery (ja: 停電復帰, en: Recovery
            from outage) timeOut (ja: タイムアウト, en: Time out) batteryLow (ja: 電池残量低下,
            en: Battery low) '
        timerOperationMode:
          type: boolean
          description: '[ja: タイマ動作設定, en: Timer operation setting] _True (ja: ON,
            en: ON) False (ja: OFF, en: OFF) '
        openingSpeed:
          type: string
          enum:
          - low
          - medium
          - high
          description: '[ja: 開速度設定, en: Opening speed setting] _low (ja: 低, en: Low)
            medium (ja: 中, en: Medium) high (ja: 高, en: High) '
        closingSpeed:
          type: string
          enum:
          - low
          - medium
          - high
          description: '[ja: 閉速度設定, en: Closing speed setting] _low (ja: 低, en: Low)
            medium (ja: 中, en: Medium) high (ja: 高, en: High) '
        operationTime:
          type: number
          minimum: 0
          maximum: 253
          description: '[ja: 動作時間設定値, en: Operation time] '
