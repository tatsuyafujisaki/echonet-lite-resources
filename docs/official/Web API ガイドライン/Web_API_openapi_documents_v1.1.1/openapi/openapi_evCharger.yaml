components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesEvCharger:
      description: propertiesEvCharger
      type: object
      properties:
        ratedChargeElectricPower:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 定格充電能力, en: Rated charge capacity] '
        chargeStatus:
          type: string
          enum:
          - undefined
          - notConnected
          - notChargeable
          - chargeable
          - unknown
          description: '[ja: 車両接続・充電可否状態, en: Vehicle connection and chargeable status]
            _undefined (ja: 不定, en: Undefined) notConnected (ja: 車両未接続, en: Not connected)
            notChargeable (ja: 車両接続・充電不可, en: Not chargeable) chargeable (ja: 車両接続・充電可,
            en: Chargeable) unknown (ja: 車両接続・充電可否不明, en: Unknown) '
        minimumAndMaximumChargingElectricPower:
          type: object
          properties:
            minimumElectricPower:
              type: number
              minimum: 0
              maximum: 999999999
              description: '[ja: 最小充電電力値, en: Minimum charging electric energy] _'
            maximumElectricPower:
              type: number
              minimum: 0
              maximum: 999999999
              description: '[ja: 最大充電電力値, en: Maximum charging electric energy] _'
          description: '[ja: 最小最大充電電力値, en: Minimum/maximum charging electric energy] '
        minimumAndMaximumChargingCurrent:
          type: object
          properties:
            minimumCurrent:
              type: number
              minimum: 0
              maximum: 3276.6
              multipleOf: 0.1
              description: '[ja: 最小充電電流値, en: Minimum charging current] _'
            maximumCurrent:
              type: number
              minimum: 0
              maximum: 3276.6
              multipleOf: 0.1
              description: '[ja: 最大充電電流値, en: Maximum charging current] _'
          description: '[ja: 最小最大充電電流値, en: Minimum/maximum charging electric current] '
        equipmentType:
          type: string
          enum:
          - ac_no_communication
          - ac_cplt
          - ac_hlc_charge
          - dc_aa_charge
          - dc_bb_charge
          - dc_ee_charge
          - dc_ff_charge
          description: '[ja: 充電器タイプ, en: Charger type] _ac_no_communication (ja: AC_通信無し,
            en: AC_NO_COMMUNICATION) ac_cplt (ja: AC_CPLT, en: AC_CPLT) ac_hlc_charge
            (ja: AC_HLC (充電のみ), en: AC_HLC_Charge) dc_aa_charge (ja: DCタイプ_AA (充電のみ),
            en: DC_AA_Charge) dc_bb_charge (ja: DCタイプ_BB (充電のみ), en: DC_BB_Charge)
            dc_ee_charge (ja: DCタイプ_EE (充電のみ), en: DC_EE_Charge) dc_ff_charge (ja:
            DCタイプ_FF (充電のみ), en: DC_FF_Charge) '
        chargeableCapacity:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 車載電池の充電可能容量値, en: Chargeable capacity of vehicle mounted
            battery] '
        remainingChargeableCapacity:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 車載電池の充電可能残容量値, en: Remaining chargeable capacity of vehicle
            mounted battery] '
        usedCapacity1:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 車載電池の使用容量値1, en: Used capacity of vehicle mounted battery
            1] '
        ratedVoltage:
          type: number
          minimum: 0
          maximum: 32766
          description: '[ja: 定格電圧, en: Rated voltage] '
        instantaneousElectricPower:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 瞬時充電電力計測値, en: Measured instantaneous charging electric
            energy] '
        cumulativeChargingElectricEnergy:
          type: number
          minimum: 0
          maximum: 999999.999
          multipleOf: 0.001
          description: '[ja: 積算充電電力量計測値, en: Measured cumulative amount of charging
            electric energy] '
        operationMode:
          type: string
          enum:
          - charge
          - standby
          - idle
          - other
          description: '[ja: 運転モード設定, en: Operation mode setting] _charge (ja: 充電,
            en: Charge) standby (ja: 待機, en: Standby) idle (ja: 停止, en: Idle) other
            (ja: その他, en: Other) '
        remainingCapacity1:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 車載電池の電池残容量1, en: Remaining stored electricity of vehicle
            mounted battery1] '
        remainingCapacity3:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 車載電池の電池残容量3, en: Remaining stored electricity of vehicle
            mounted battery3] '
        vehicleId:
          type: string
          description: '[ja: 車両ID, en: Vehicle ID] '
        targetChargingElectricEnergy:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 充電量設定値, en: Charging amount setting] '
        chargingElectricPower:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 充電電力設定値, en: Charging electric energy setting] '
        chargingCurrent:
          type: number
          minimum: 0
          maximum: 6553.3
          multipleOf: 0.1
          description: '[ja: 充電電流設定値, en: Charging current setting] '
    ratedChargeElectricPowerEvCharger:
      description: '[ja: 定格充電能力, en: Rated charge capacity]'
      type: object
      properties:
        ratedChargeElectricPower:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 定格充電能力, en: Rated charge capacity] '
    chargeStatusEvCharger:
      description: '[ja: 車両接続・充電可否状態, en: Vehicle connection and chargeable status]'
      type: object
      properties:
        chargeStatus:
          type: string
