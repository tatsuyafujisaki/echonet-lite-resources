components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesFloorHeater:
      description: propertiesFloorHeater
      type: object
      properties:
        onTimerReservation:
          type: string
          enum:
          - 'on'
          - 'off'
          description: '[ja: ON タイマ予約設定, en: ON timer reservation setting] _on (ja:
            予約入, en: ON) off (ja: 予約切, en: OFF) '
        timeOfOnTimer:
          type: string
          format: time
          description: '[ja: ON タイマ時刻設定値, en: Time set by ON timer] '
        relativeTimeOfOnTimer:
          type: string
          format: time
          description: '[ja: ON タイマ相対時間設定値, en: Relative ON timer setting] '
        offTimerReservation:
          type: string
          enum:
          - 'on'
          - 'off'
          description: '[ja: OFF タイマ予約設定, en: OFF timer reservation setting] _on (ja:
            予約入, en: ON) off (ja: 予約切, en: OFF) '
        timeOfOffTimer:
          type: string
          format: time
          description: '[ja: OFF タイマ時刻設定値, en: Time set by OFF timer] '
        relativeTimeOfOffTimer:
          type: string
          format: time
          description: '[ja: OFF タイマ相対時間設定値, en: Relative OFF timer setting] '
        maximumTargetTemperature2:
          type: number
          minimum: 1
          maximum: 15
          multipleOf: 1
          description: '[ja: 温度設定2設定可能最大レベル, en: Maximum temperature level] '
        targetTemperature1:
          oneOf:
          - type: number
            minimum: 0
            maximum: 50
          - type: string
            enum:
            - auto
            description: '_auto (ja: 自動, en: Auto) '
          description: '[ja: 温度設定1, en: Set temperature value] '
        targetTemperature2:
          oneOf:
          - type: number
            minimum: 1
            maximum: 15
            multipleOf: 1
          - type: string
            enum:
            - auto
