components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesDrElectricEnergyMeter:
      description: propertiesDrElectricEnergyMeter
      type: object
      properties:
        deviceType:
          type: string
          description: '[ja: 機器種別, en: Device type] '
        deviceId:
          type: string
          description: '[ja: 機器ID, en: Device ID] '
        toleranceClass:
          type: string
          enum:
          - n1
          - n2
          - n3
          - n4
          - n5
          - n6
          - n7
          - others
          description: '[ja: 公差階級, en: Tolerance class] _n1 (ja: n1, en: n1) n2 (ja:
            n2, en: n2) n3 (ja: n3, en: n3) n4 (ja: n4, en: n4) n5 (ja: n5, en: n5)
            n6 (ja: n6, en: n6) n7 (ja: n7, en: n7) others (ja: その他, en: others) '
        retentionDaysOfCumulativeElectricEnergyLog:
          oneOf:
          - type: number
            minimum: 0
            maximum: 99
          - type: string
            enum:
            - historyUnavailable
            description: '_historyUnavailable (ja: 履歴未対応, en: History unavailable) '
          description: '[ja: 積算電力量計測値履歴保持日数, en: Number of days to retain historical
            data of measured cumulative amounts of electric energy] '
        targetDeviceId:
          type: string
          description: '[ja: 計量対象機器識別番号, en: Identification number of device to be
            metered] '
        currentTime:
          type: string
          format: time
          description: '[ja: 現在時分秒設定, en: Current hour, minute, and second setting] '
        timeSynchronizationStatus:
          type: string
          enum:
          - noSync
          - success
          - fail
          - notImplemented
          description: '[ja: 時刻同期状態, en: Time synchronization status] _noSync (ja:
            時刻同期なし, en: no time synchronization) success (ja: 時刻同期成功, en: time synchronization
            successful) fail (ja: 時刻同期失敗, en: time synchronization failed) notImplemented
            (ja: 時刻同期機能未搭載, en: time synchronization function not implemented) '
        acInputCumulativeElectricEnergy:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 積算電力量計測値(交流入力), en: Measured cumulative amounts of electric
            energy (AC input)] '
        acInputCumulativeElectricEnergyLog:
          type: object
          properties:
            day:
