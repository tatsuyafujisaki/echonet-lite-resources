components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesCommercialAirConditionerOutdoorUnit:
      description: propertiesCommercialAirConditionerOutdoorUnit
      type: object
      properties:
        specialState:
          type: boolean
          description: '[ja: 特殊状態, en: Special state] _False (ja: 通常状態, en: Normal
            operation) True (ja: 特殊状態, en: Special state) '
        ratedPowerConsumption:
          type: object
          properties:
            cooling:
              oneOf:
              - type: number
                minimum: 0
                maximum: 4294967293
              - type: string
                enum:
                - unsupported
                description: '_unsupported (ja: 未サポート, en: Unsupported) '
              description: '[ja: 冷房, en: Cooling] _'
            heating:
              oneOf:
              - type: number
                minimum: 0
                maximum: 4294967293
              - type: string
                enum:
                - unsupported
                description: '_unsupported (ja: 未サポート, en: Unsupported) '
              description: '[ja: 暖房, en: Heating] _'
          description: '[ja: 室外機定格消費電力値, en: Rated power consumption of outdoor unit] '
        outdoorTemperature:
          oneOf:
          - type: number
            minimum: -127
            maximum: 125
          - type: string
            enum:
            - unmeasurable
            description: '_unmeasurable (ja: 計測値を返せない, en: When the measurement value
              cannot be returned) '
          description: '[ja: 室外機温度計測値, en: Measured outdoor unit temperature] '
        groupInformation:
          oneOf:
          - type: number
            minimum: 1
            maximum: 253
          - type: string
            enum:
            - noSetting
            description: '_noSetting (ja: 設定なし, en: No setting) '
          description: '[ja: グループ情報, en: Group information] '
        powerConsumption:
          type: number
          minimum: 0
          maximum: 4294967293
          description: '[ja: 室外機消費電力計測値, en: Measured power consumption of outdoor
            unit] '
        powerConsumptionWillBeSaved:
          type: number
          minimum: 0
          maximum: 4294967293
          description: '[ja: 室外機節電可能消費電力, en: Possible power savings for outdoor units] '
        powerConsumptionLimit:
          oneOf:
          - type: number
            minimum: 1
            maximum: 4294967293
          - type: string
            enum:
            - canceling
            description: '_canceling (ja: 電力制限解除, en: Canceling the restriction) '
          description: '[ja: 室外機消費電力制限設定, en: Settings restricting power consumption
            of outdoor units] '
        restrictedMinimumPowerConsumption:
          type: number
          minimum: 0
          maximum: 4294967293
          description: '[ja: 室外機抑制最低消費電力, en: Minimum power consumption for restricted
            outdoor unit] '
        groupDeviceList:
          type: array
          items:
            type: object
            properties:
              deviceId:
                type: string
              deviceType:
                type: string
          description: '[ja: グループ内デバイスリスト, en: List of devices in group] '
    specialStateCommercialAirConditionerOutdoorUnit:
      description: '[ja: 特殊状態, en: Special state]'
      type: object
      properties:
        specialState:
          type: boolean
          description: '[ja: 特殊状態, en: Special state] _False (ja: 通常状態, en: Normal
            operation) True (ja: 特殊状態, en: Special state) '
    ratedPowerConsumptionCommercialAirConditionerOutdoorUnit:
      description: '[ja: 室外機定格消費電力値, en: Rated power consumption of outdoor unit]'
      type: object
      properties:
        ratedPowerConsumption:
          type: object
          properties:
            cooling:
              oneOf:
              - type: number
                minimum: 0
                maximum: 4294967293
              - type: string
                enum:
                - unsupported
                description: '_unsupported (ja: 未サポート, en: Unsupported) '
              description: '[ja: 冷房, en: Cooling] _'
            heating:
              oneOf:
              - type: number
                minimum: 0
                maximum: 4294967293
              - type: string
                enum:
                - unsupported
                description: '_unsupported (ja: 未サポート, en: Unsupported) '
              description: '[ja: 暖房, en: Heating] _'
          description: '[ja: 室外機定格消費電力値, en: Rated power consumption of outdoor unit] '
    outdoorTemperatureCommercialAirConditionerOutdoorUnit:
      description: '[ja: 室外機温度計測値, en: Measured outdoor unit temperature]'
      type: object
      properties:
        outdoorTemperature:
          oneOf:
          - type: number
            minimum: -127
            maximum: 125
          - type: string
            enum:
            - unmeasurable
            description: '_unmeasurable (ja: 計測値を返せない, en: When the measurement value
              cannot be returned) '
          description: '[ja: 室外機温度計測値, en: Measured outdoor unit temperature] '
    groupInformationCommercialAirConditionerOutdoorUnit:
      description: '[ja: グループ情報, en: Group information]'
      type: object
      properties:
        groupInformation:
          oneOf:
          - type: number
            minimum: 1
            maximum: 253
          - type: string
            enum:
            - noSetting
            description: '_noSetting (ja: 設定なし, en: No setting) '
          description: '[ja: グループ情報, en: Group information] '
    powerConsumptionCommercialAirConditionerOutdoorUnit:
      description: '[ja: 室外機消費電力計測値, en: Measured power consumption of outdoor unit]'
      type: object
      properties:
        powerConsumption:
          type: number
          minimum: 0
          maximum: 4294967293
          description: '[ja: 室外機消費電力計測値, en: Measured power consumption of outdoor
            unit] '
    powerConsumptionWillBeSavedCommercialAirConditionerOutdoorUnit:
      description: '[ja: 室外機節電可能消費電力, en: Possible power savings for outdoor units]'
      type: object
      properties:
        powerConsumptionWillBeSaved:
          type: number
          minimum: 0
          maximum: 4294967293
          description: '[ja: 室外機節電可能消費電力, en: Possible power savings for outdoor units] '
    powerConsumptionLimitCommercialAirConditionerOutdoorUnit:
      description: '[ja: 室外機消費電力制限設定, en: Settings restricting power consumption of
        outdoor units]'
      type: object
      properties:
        powerConsumptionLimit:
          oneOf:
          - type: number
            minimum: 1
            maximum: 4294967293
          - type: string
            enum:
            - canceling
            description: '_canceling (ja: 電力制限解除, en: Canceling the restriction) '
          description: '[ja: 室外機消費電力制限設定, en: Settings restricting power consumption
            of outdoor units] '
    restrictedMinimumPowerConsumptionCommercialAirConditionerOutdoorUnit:
      description: '[ja: 室外機抑制最低消費電力, en: Minimum power consumption for restricted
        outdoor unit]'
      type: object
      properties:
        restrictedMinimumPowerConsumption:
          type: number
          minimum: 0
          maximum: 4294967293
          description: '[ja: 室外機抑制最低消費電力, en: Minimum power consumption for restricted
            outdoor unit] '
    groupDeviceListCommercialAirConditionerOutdoorUnit:
      description: '[ja: グループ内デバイスリスト, en: List of devices in group]'
      type: object
      properties:
        groupDeviceList:
          type: array
          items:
            type: object
            properties:
              deviceId:
                type: string
              deviceType:
                type: string
          description: '[ja: グループ内デバイスリスト, en: List of devices in group] '
  requestBodies: {}
  responses:
