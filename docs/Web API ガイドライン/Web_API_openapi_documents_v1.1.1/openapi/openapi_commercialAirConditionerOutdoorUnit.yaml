        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/powerConsumptionWillBeSaved:
    get:
      tags:
      - CommercialAirConditionerOutdoorUnit
      summary: 'Get: Possible power savings for outdoor units'
      operationId: getDevicesPropertiesPowerConsumptionWillBeSavedCommercialAirConditionerOutdoorUnit
      description: '取得: 室外機節電可能消費電力'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/powerConsumptionWillBeSavedCommercialAirConditionerOutdoorUnit'
        '401':
