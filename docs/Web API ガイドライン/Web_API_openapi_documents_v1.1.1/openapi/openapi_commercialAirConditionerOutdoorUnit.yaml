      operationId: getDevicesPropertiesRatedPowerConsumptionCommercialAirConditionerOutdoorUnit
      description: '取得: 室外機定格消費電力値'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ratedPowerConsumptionCommercialAirConditionerOutdoorUnit'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/outdoorTemperature:
    get:
      tags:
      - CommercialAirConditionerOutdoorUnit
      summary: 'Get: Measured outdoor unit temperature'
      operationId: getDevicesPropertiesOutdoorTemperatureCommercialAirConditionerOutdoorUnit
      description: '取得: 室外機温度計測値'
