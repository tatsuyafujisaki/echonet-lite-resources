      tags:
      - CommercialAirConditionerOutdoorUnit
      summary: 'Set: Settings restricting power consumption of outdoor units'
      operationId: putDevicesPropertiesPowerConsumptionLimitCommercialAirConditionerOutdoorUnit
      description: '設定: 室外機消費電力制限設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/powerConsumptionLimitCommercialAirConditionerOutdoorUnit'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/powerConsumptionLimitCommercialAirConditionerOutdoorUnit'
        '401':
