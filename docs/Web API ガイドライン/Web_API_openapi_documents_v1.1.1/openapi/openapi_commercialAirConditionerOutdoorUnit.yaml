tags:
- name: CommercialAirConditionerOutdoorUnit
  description: tag for Package-type commercial air conditioner (outdoor unit)
security:
- api_key: []
paths:
  /elapi/v1/devices/{device_id}/properties:
    get:
      tags:
      - CommercialAirConditionerOutdoorUnit
      summary: 'Get: properties'
      operationId: getDevicesPropertiesCommercialAirConditionerOutdoorUnit
      description: '取得: properties'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/propertiesCommercialAirConditionerOutdoorUnit'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/specialState:
    get:
      tags:
      - CommercialAirConditionerOutdoorUnit
      summary: 'Get: Special state'
      operationId: getDevicesPropertiesSpecialStateCommercialAirConditionerOutdoorUnit
      description: '取得: 特殊状態'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
