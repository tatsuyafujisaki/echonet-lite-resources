          multipleOf: 0.001
          description: '[ja: 瞬時ガス消費量計測値, en: Measured instantaneous gas consumption] '
    cumulativeGasConsumptionFuelCell:
      description: '[ja: 積算ガス消費量計測値, en: Measured cumulative gas consumption]'
      type: object
      properties:
        cumulativeGasConsumption:
          type: number
          minimum: 0
          maximum: 999999.999
          multipleOf: 0.001
          description: '[ja: 積算ガス消費量計測値, en: Measured cumulative gas consumption] '
    powerGenerationSettingFuelCell:
      description: '[ja: 発電動作設定, en: Power generation setting]'
      type: object
      properties:
        powerGenerationSetting:
          type: string
          enum:
          - generationOn
          - generationOff
          description: '[ja: 発電動作設定, en: Power generation setting] _generationOn (ja:
            発電動作, en: Power generation ON) generationOff (ja: 発電停止, en: Power generation
            OFF) '
    powerGenerationStatusFuelCell:
      description: '[ja: 発電動作状態, en: Power generation status]'
      type: object
      properties:
        powerGenerationStatus:
          type: string
          enum:
          - generating
          - stopped
          - starting
          - stopping
          - idling
          description: '[ja: 発電動作状態, en: Power generation status] _generating (ja:
            発電中, en: Generating) stopped (ja: 停止中, en: Stopped) starting (ja: 起動中,
            en: Starting) stopping (ja: 停止動作中, en: Stopping) idling (ja: アイドル中, en:
            Idling) '
    inHouseInstantaneousPowerConsumptionFuelCell:
      description: '[ja: 宅内瞬時消費電力計測値, en: Measured in-house instantaneous power consumption]'
