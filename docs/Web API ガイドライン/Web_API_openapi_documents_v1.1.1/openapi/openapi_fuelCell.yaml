components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesFuelCell:
      description: propertiesFuelCell
      type: object
      properties:
        waterTemperatureInWaterHeater:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 温水器湯温計測値, en: Measured temperature of water in water
            heater] '
        ratedElectricPowerOfGeneration:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 定格発電出力, en: Rated power generation output] '
        heatCapacityOfStorageTank:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 貯湯槽熱量, en: Heating value of hot water storage tank] '
        instantaneousElectricPowerOfGeneration:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 瞬時発電電力計測値, en: Measured instantaneous power generation
            output] '
        cumulativeElectricEnergyOfGeneration:
          type: number
          minimum: 0
          maximum: 999999.999
          multipleOf: 0.001
          description: '[ja: 積算発電電力量計測値, en: Measured cumulative power generation
            output] '
        instantaneousGasConsumption:
          type: number
          minimum: 0
          maximum: 65.533
          multipleOf: 0.001
          description: '[ja: 瞬時ガス消費量計測値, en: Measured instantaneous gas consumption] '
        cumulativeGasConsumption:
          type: number
          minimum: 0
          maximum: 999999.999
          multipleOf: 0.001
          description: '[ja: 積算ガス消費量計測値, en: Measured cumulative gas consumption] '
        powerGenerationSetting:
          type: string
          enum:
          - generationOn
          - generationOff
          description: '[ja: 発電動作設定, en: Power generation setting] _generationOn (ja:
            発電動作, en: Power generation ON) generationOff (ja: 発電停止, en: Power generation
            OFF) '
        powerGenerationStatus:
          type: string
          enum:
          - generating
          - stopped
          - starting
          - stopping
          - idling
          description: '[ja: 発電動作状態, en: Power generation status] _generating (ja:
            発電中, en: Generating) stopped (ja: 停止中, en: Stopped) starting (ja: 起動中,
            en: Starting) stopping (ja: 停止動作中, en: Stopping) idling (ja: アイドル中, en:
            Idling) '
        inHouseInstantaneousPowerConsumption:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 宅内瞬時消費電力計測値, en: Measured in-house instantaneous power
            consumption] '
        inHouseCumulativeEnergyConsumption:
          type: number
          minimum: 0
          maximum: 999999.999
          multipleOf: 0.001
          description: '[ja: 宅内積算消費電力量計測値, en: Measured in-house cumulative energy
            consumption] '
        powerSystemInterconnectionStatus:
          type: string
          enum:
          - reversePowerFlowAcceptable
          - independent
          - reversePowerFlowNotAcceptable
          description: '[ja: 系統連系状態, en: System interconnected type] _reversePowerFlowAcceptable
            (ja: 系統連系 (逆潮流可), en: System interconnected type (reverse power flow acceptable))
            independent (ja: 独立, en: Independent type) reversePowerFlowNotAcceptable
            (ja: 系統連系 (逆潮流不可), en: System interconnected type (reverse power flow
            not acceptable)) '
        requestedTimeOfGeneration:
          oneOf:
          - type: object
            properties:
              startTime:
                type: string
                format: time
                description: '[ja: 開始時刻, en: Start time] _'
              endTime:
                type: string
                format: time
                description: '[ja: 終了時刻, en: End time] _'
          - type: string
            enum:
            - undefined
            description: '_undefined (ja: 未設定, en: Undefined) '
          description: '[ja: 発電要請時刻設定, en: Power generation request time setting] '
        powerGenerationMode:
          type: string
          enum:
          - maximumRating
          - loadFollowing
          description: '[ja: 指定発電状態, en: Designated power generation status] _maximumRating
            (ja: 定格最大での発電, en: Power generation at the maximum rating) loadFollowing
            (ja: 負荷追従での発電, en: Load following power generation) '
        remainingHotWaterAmount:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 残湯量計測値, en: Measured remaining hot water amount] '
        tankCapacity:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: タンク容量値, en: Tank capacity] '
    waterTemperatureInWaterHeaterFuelCell:
      description: '[ja: 温水器湯温計測値, en: Measured temperature of water in water heater]'
      type: object
      properties:
        waterTemperatureInWaterHeater:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 温水器湯温計測値, en: Measured temperature of water in water
            heater] '
    ratedElectricPowerOfGenerationFuelCell:
      description: '[ja: 定格発電出力, en: Rated power generation output]'
      type: object
      properties:
        ratedElectricPowerOfGeneration:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 定格発電出力, en: Rated power generation output] '
    heatCapacityOfStorageTankFuelCell:
      description: '[ja: 貯湯槽熱量, en: Heating value of hot water storage tank]'
      type: object
      properties:
        heatCapacityOfStorageTank:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 貯湯槽熱量, en: Heating value of hot water storage tank] '
    instantaneousElectricPowerOfGenerationFuelCell:
      description: '[ja: 瞬時発電電力計測値, en: Measured instantaneous power generation output]'
      type: object
      properties:
        instantaneousElectricPowerOfGeneration:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 瞬時発電電力計測値, en: Measured instantaneous power generation
            output] '
    cumulativeElectricEnergyOfGenerationFuelCell:
      description: '[ja: 積算発電電力量計測値, en: Measured cumulative power generation output]'
      type: object
      properties:
        cumulativeElectricEnergyOfGeneration:
          type: number
          minimum: 0
          maximum: 999999.999
          multipleOf: 0.001
          description: '[ja: 積算発電電力量計測値, en: Measured cumulative power generation
            output] '
    instantaneousGasConsumptionFuelCell:
      description: '[ja: 瞬時ガス消費量計測値, en: Measured instantaneous gas consumption]'
      type: object
      properties:
        instantaneousGasConsumption:
