tags:
- name: SmartElectricEnergySubMeter
  description: tag for Smart electric energy meter for sub-metering
security:
- api_key: []
paths:
  /elapi/v1/devices/{device_id}/properties:
    get:
      tags:
      - SmartElectricEnergySubMeter
      summary: 'Get: properties'
      operationId: getDevicesPropertiesSmartElectricEnergySubMeter
      description: '取得: properties'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/propertiesSmartElectricEnergySubMeter'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/normalDirectionCumulativeElectricEnergy:
    get:
      tags:
      - SmartElectricEnergySubMeter
      summary: 'Get: Measured cumulative amount of electric energy(normal direction)'
