openapi: 3.0.3
servers:
- url: https://dev.xxx.com
  description: Development server
- url: https://prod.xxx.com
  description: Production server
info:
  version: 1.0.0
  title: ECHONET Lite Web APIs
  description: API server with EL Web APIs
  termsOfService: https://xxxx.com/terms/
  contact:
    name: API support
    url: https://xxx.com/support/
    email: support@xxx.com
  license:
    name: MIT License
    url: https://opensource.org/license/mit/
tags:
- name: LightingSystem
  description: tag for Lighting system
security:
- api_key: []
paths:
  /elapi/v1/devices/{device_id}/properties:
    get:
      tags:
      - LightingSystem
      summary: 'Get: properties'
      operationId: getDevicesPropertiesLightingSystem
      description: '取得: properties'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/propertiesLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/lightLevel:
    get:
      tags:
      - LightingSystem
      summary: 'Get: Light level setting'
      operationId: getDevicesPropertiesLightLevelLightingSystem
      description: '取得: 照明の明るさ設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lightLevelLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
      - LightingSystem
      summary: 'Set: Light level setting'
      operationId: putDevicesPropertiesLightLevelLightingSystem
      description: '設定: 照明の明るさ設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/lightLevelLightingSystem'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lightLevelLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/sceneId:
    get:
      tags:
      - LightingSystem
      summary: 'Get: Scene control setting'
      operationId: getDevicesPropertiesSceneIdLightingSystem
      description: '取得: シーン制御設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sceneIdLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
      - LightingSystem
      summary: 'Set: Scene control setting'
      operationId: putDevicesPropertiesSceneIdLightingSystem
      description: '設定: シーン制御設定'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/sceneIdLightingSystem'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sceneIdLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /elapi/v1/devices/{device_id}/properties/maximumNumberOfSceneId:
    get:
      tags:
      - LightingSystem
      summary: 'Get: Number that can assign scene control setting'
      operationId: getDevicesPropertiesMaximumNumberOfSceneIdLightingSystem
      description: '取得: シーン制御設定可能数'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/maximumNumberOfSceneIdLightingSystem'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesLightingSystem:
      description: propertiesLightingSystem
      type: object
      properties:
        lightLevel:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 照明の明るさ設定, en: Light level setting] '
        sceneId:
          oneOf:
          - type: number
            minimum: 1
            maximum: 253
          - type: string
            enum:
            - noSetting
            description: '_noSetting (ja: 設定なし, en: No setting) '
          description: '[ja: シーン制御設定, en: Scene control setting] '
        maximumNumberOfSceneId:
          type: number
          minimum: 0
          maximum: 253
          description: '[ja: シーン制御設定可能数, en: Number that can assign scene control
            setting] '
    lightLevelLightingSystem:
      description: '[ja: 照明の明るさ設定, en: Light level setting]'
      type: object
      properties:
        lightLevel:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 照明の明るさ設定, en: Light level setting] '
    sceneIdLightingSystem:
      description: '[ja: シーン制御設定, en: Scene control setting]'
      type: object
      properties:
        sceneId:
          oneOf:
          - type: number
            minimum: 1
            maximum: 253
          - type: string
            enum:
            - noSetting
            description: '_noSetting (ja: 設定なし, en: No setting) '
          description: '[ja: シーン制御設定, en: Scene control setting] '
    maximumNumberOfSceneIdLightingSystem:
      description: '[ja: シーン制御設定可能数, en: Number that can assign scene control setting]'
      type: object
      properties:
        maximumNumberOfSceneId:
          type: number
          minimum: 0
          maximum: 253
          description: '[ja: シーン制御設定可能数, en: Number that can assign scene control
            setting] '
  requestBodies: {}
  responses:
    Unauthorized:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    api_key:
      type: apiKey
      in: header
      name: X-Elapi-key
