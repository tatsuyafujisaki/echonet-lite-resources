      type: object
      properties:
        faultStatus:
          type: boolean
          description: '[ja: 異常発生状態, en: Fault status] _True (ja: 異常あり, en: Fault
            occurred.) False (ja: 異常なし, en: No fault has occurred.) '
    faultDescriptionCommon:
      description: '[ja: 異常内容, en: Fault description]'
      type: object
