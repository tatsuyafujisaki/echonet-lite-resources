components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesCommon:
      description: propertiesCommon
      type: object
      properties:
        operationStatus:
          type: boolean
          description: '[ja: 動作状態, en: Operation status] _True (ja: ON, en: ON) False
            (ja: OFF, en: OFF) '
        installationLocation:
          type: string
          description: '[ja: 設置場所, en: Installation location] '
        protocol:
          type: object
          properties:
            type:
              type: string
            version:
              type: string
          description: '[ja: Protocol version情報, en: Protocol version information] '
        id:
          type: string
          description: '[ja: 識別番号, en: Identification number] '
        instantaneousElectricPowerConsumption:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 瞬時消費電力計測値, en: Measured instantaneous power consumption] '
        consumedCumulativeElectricEnergy:
          type: number
          minimum: 0
          maximum: 999999.999
          multipleOf: 0.001
          description: '[ja: 積算消費電力量計測値, en: Measured cumulative electric energy consumption] '
        manufacturerFaultCode:
          type: string
          description: '[ja: メーカ異常コード, en: Manufacturer''s fault code] '
        currentLimit:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 電流制限設定, en: Current limit setting] '
        faultStatus:
          type: boolean
          description: '[ja: 異常発生状態, en: Fault status] _True (ja: 異常あり, en: Fault
            occurred.) False (ja: 異常なし, en: No fault has occurred.) '
        faultDescription:
          type: string
          enum:
          - noFault
          - trunOffOrUnplug
          - resetButton
          - setIncorrectly
          - supply
          - cleaning
          - changingBattery
          - recoverOperationNoRequired
          - userDefinable1
          - abnormalEventOrSafety
          - switch
          - sensorSystem
          - component
          - controlCircuitBoard
          - userDefinable2
          - repairLocationUnkown
          - fault
          description: '[ja: 異常内容, en: Fault description] _noFault (ja: 異常なし, en:
            No fault) trunOffOrUnplug (ja: スイッチを切る/コンセントを抜き再操作, en: Faults that can
            be recovered from by turn off the power or unplug and reoperate.) resetButton
            (ja: リセットボタンを押し再操作, en: Faults that can be recovered from by pressing
            the reset button.) setIncorrectly (ja: セット不良, en: Device set incorrectly)
            supply (ja: 補給, en: Supply) cleaning (ja: 掃除（フィルタ等）, en: Cleaning (filters,
            etc.)) changingBattery (ja: 電池交換, en: Changing the battery) recoverOperationNoRequired
            (ja: 復帰操作不要, en: Recover operation no required) userDefinable1 (ja: ユーザ定義領域1,
            en: User-definable domain 1) abnormalEventOrSafety (ja: 異常現象／安全装置作動, en:
            Abnormal event or the tripping of a safety device.) switch (ja: スイッチ異常,
            en: Fault in a switch) sensorSystem (ja: センサ異常, en: Fault in the sensor
            system) component (ja: 機能部品異常, en: Fault in a component such as an actuator.)
            controlCircuitBoard (ja: 制御基板異常, en: Fault in a control circuit board.)
            userDefinable2 (ja: ユーザ定義領域2, en: User-definable domain 2) repairLocationUnkown
            (ja: 修理箇所不明, en: Repair location unknown) fault (ja: 異常あり, en: Fault) '
        manufacturer:
          type: object
          properties:
            code:
              type: string
            description: _
          description: '[ja: 会員ID/メーカー, en: Manufacturer] '
        businessFacilityCode:
          type: string
          description: '[ja: 事業場コード, en: Business facility code] '
        productCode:
          type: string
          description: '[ja: 商品コード, en: Product code] '
        serialNumber:
          type: string
          description: '[ja: 製造番号, en: Serial number] '
        productionDate:
          type: string
          format: date
          description: '[ja: 製造年月日, en: Production date] '
        powerSaving:
          type: boolean
          description: '[ja: 節電動作設定, en: Power-saving operation setting] _True (ja:
            節電動作中, en: Power saving Operation) False (ja: 通常動作中, en: Normal Operation) '
        currentDateAndTime:
          type: string
          format: date-time
          description: '[ja: 現在日時, en: Current date and time] '
        powerLimit:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 電力制限設定, en: Power limit setting] '
        hourMeter:
          type: object
          properties:
            time:
              type: number
              minimum: 0
              maximum: 4294967295
              description: '[ja: 時間, en: time] _'
          description: '[ja: 積算運転時間, en: Cumulative operating time] '
    operationStatusCommon:
      description: '[ja: 動作状態, en: Operation status]'
      type: object
      properties:
        operationStatus:
          type: boolean
          description: '[ja: 動作状態, en: Operation status] _True (ja: ON, en: ON) False
            (ja: OFF, en: OFF) '
    installationLocationCommon:
      description: '[ja: 設置場所, en: Installation location]'
      type: object
      properties:
        installationLocation:
          type: string
          description: '[ja: 設置場所, en: Installation location] '
    protocolCommon:
      description: '[ja: Protocol version情報, en: Protocol version information]'
      type: object
      properties:
        protocol:
          type: object
          properties:
            type:
              type: string
            version:
              type: string
          description: '[ja: Protocol version情報, en: Protocol version information] '
    idCommon:
      description: '[ja: 識別番号, en: Identification number]'
      type: object
      properties:
        id:
          type: string
          description: '[ja: 識別番号, en: Identification number] '
    instantaneousElectricPowerConsumptionCommon:
      description: '[ja: 瞬時消費電力計測値, en: Measured instantaneous power consumption]'
      type: object
      properties:
        instantaneousElectricPowerConsumption:
