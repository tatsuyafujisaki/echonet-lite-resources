      - HybridWaterHeater
      summary: 'Get: properties'
      operationId: getDevicesPropertiesHybridWaterHeater
      description: '取得: properties'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/propertiesHybridWaterHeater'
