      summary: 'Set: Solar power generations utilization time'
      operationId: putDevicesPropertiesSolarPowerGenerationsUtilizationTimeHybridWaterHeater
      description: '設定: 太陽光発電利用時間'
      parameters:
      - description: device id
        name: device_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
