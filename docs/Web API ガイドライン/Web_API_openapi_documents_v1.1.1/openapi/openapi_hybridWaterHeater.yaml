      summary: 'Set: Heater mode setting for auxiliary heat source machine.'
      operationId: putDevicesPropertiesHeaterModeForAuxiliaryHeatSourceMachineHybridWaterHeater
      description: '設定: 補助熱源機暖房モード設定'
      parameters:
      - description: device id
