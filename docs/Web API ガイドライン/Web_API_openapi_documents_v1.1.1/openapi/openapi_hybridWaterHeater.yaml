  /elapi/v1/devices/{device_id}/properties/linkageModeForSolarPowerGeneration:
    get:
      tags:
      - HybridWaterHeater
      summary: 'Get: Linkage mode setting for solar power generation'
      operationId: getDevicesPropertiesLinkageModeForSolarPowerGenerationHybridWaterHeater
