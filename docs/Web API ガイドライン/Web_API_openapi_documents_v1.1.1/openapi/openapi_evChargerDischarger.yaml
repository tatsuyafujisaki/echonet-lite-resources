components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesEvChargerDischarger:
      description: propertiesEvChargerDischarger
      type: object
      properties:
        dischargeableCapacity1:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 車載電池の放電可能容量値1, en: Dischargeable capacity of vehicle
            mounted battery 1] '
        dischargeableCapacity2:
          type: number
          minimum: 0
          maximum: 3276.6
          multipleOf: 0.1
          description: '[ja: 車載電池の放電可能容量値2, en: Dischargeable capacity of vehicle
            mounted battery 2] '
        remainingDischargeableCapacity1:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 車載電池の放電可能残容量1, en: Remaining dischargeable capacity of
            vehicle mounted battery 1] '
        remainingDischargeableCapacity2:
          type: number
          minimum: 0
          maximum: 3276.6
          multipleOf: 0.1
          description: '[ja: 車載電池の放電可能残容量2, en: Remaining dischargeable capacity of
            vehicle mounted battery 2] '
        remainingDischargeableCapacity3:
          type: number
          minimum: 0
          maximum: 100
          description: '[ja: 車載電池の放電可能残容量3, en: Remaining dischargeable capacity of
            vehicle mounted battery 3] '
        ratedChargeElectricPower:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 定格充電能力, en: Rated charge capacity] '
        ratedDischargeElectricPower:
          type: number
          minimum: 0
          maximum: 999999999
          description: '[ja: 定格放電能力, en: Rated discharge capacity] '
        chargeDischargeStatus:
          type: string
          enum:
          - undefined
          - notConnected
          - connected
          - chargeable
          - dischargeable
          - chargeableDischargeable
          - unknown
          description: '[ja: 車両接続・充放電可否状態, en: Vehicle connection and chargeable/dischargeable
            status] _undefined (ja: 不定, en: Undefined) notConnected (ja: 車両未接続, en:
            Not Connected) connected (ja: 車両接続・充電不可・放電不可, en: Connected) chargeable
            (ja: 車両接続・充電可・放電不可, en: Chargeable) dischargeable (ja: 車両接続・充電不可・放電可,
            en: Dischargeable) chargeableDischargeable (ja: 車両接続・充電可・放電可, en: Chargeable
            and Dischargeable) unknown (ja: 車両接続・充電可否不明, en: Unknown of Chargeability) '
        minimumAndMaximumChargingElectricPower:
          type: object
          properties:
            minimumElectricPower:
              type: number
              minimum: 0
              maximum: 999999999
              description: '[ja: 最小充電電力値, en: Minimum charging electric energy] _'
            maximumElectricPower:
              type: number
              minimum: 0
              maximum: 999999999
              description: '[ja: 最大充電電力値, en: Maximum charging electric energy] _'
          description: '[ja: 最小最大充電電力値, en: Minimum/maximum charging electric energy] '
        minimumAndMaximumDischargingElectricPower:
          type: object
          properties:
            minimumElectricPower:
              type: number
              minimum: 0
              maximum: 999999999
              description: '[ja: 最小放電電力値, en: Minimum discharging electric energy]
                _'
            maximumElectricPower:
              type: number
              minimum: 0
              maximum: 999999999
              description: '[ja: 最大放電電力値, en: Maximum discharging electric energy]
                _'
          description: '[ja: 最小最大放電電力値, en: Minimum/maximum discharging electric energy] '
        minimumAndMaximumChargingCurrent:
          type: object
          properties:
            minimumCurrent:
              type: number
              minimum: 0
              maximum: 3276.6
              multipleOf: 0.1
              description: '[ja: 最小充電電流値, en: Minimum charging current] _'
            maximumCurrent:
              type: number
              minimum: 0
              maximum: 3276.6
              multipleOf: 0.1
              description: '[ja: 最大充電電流値, en: Maximum charging current] _'
          description: '[ja: 最小最大充電電流値, en: Minimum/maximum charging current] '
        minimumAndMaximumDischargingCurrent:
          type: object
          properties:
            minimumCurrent:
              type: number
              minimum: 0
              maximum: 3276.6
              multipleOf: 0.1
              description: '[ja: 最小放電電流値, en: Minimum discharging current] _'
            maximumCurrent:
              type: number
              minimum: 0
              maximum: 3276.6
              multipleOf: 0.1
              description: '[ja: 最大放電電流値, en: Maximum discharging current] _'
          description: '[ja: 最小最大放電電流値, en: Minimum/maximum discharging current] '
        equipmentType:
          type: string
          enum:
          - ac_cplt
          - ac_hlc_charge
          - ac_hlc_chargedischarge
          - dc_aa_charge
          - dc_aa_chargedischarge
          - dc_aa_discharge
          - dc_bb_charge
          - dc_bb_chargedischarge
          - dc_bb_discharge
          - dc_ee_charge
          - dc_ee_chargedischarge
          - dc_ee_discharge
          - dc_ff_charge
          - dc_ff_chargedischarge
          - dc_ff_discharge
          description: '[ja: 充放電器タイプ, en: Charger/Discharger type] _ac_cplt (ja: AC_CPLT,
