components:
  schemas:
    Error:
      description: error with type and message
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    propertiesRefrigerator:
      description: propertiesRefrigerator
      type: object
      properties:
        quickFreeze:
          type: string
          enum:
          - normal
          - quick
          - standby
          description: '[ja: 急速冷凍動作設定, en: Quick freeze function setting] _normal
            (ja: 通常冷凍, en: Normal operation) quick (ja: 急速冷凍, en: Quick freeze) standby
            (ja: 急速冷凍待機, en: Standby for quick freezing) '
        quickRefrigeration:
          type: string
          enum:
          - normal
          - quick
          - standby
          description: '[ja: 急速冷蔵動作設定, en: Quick refrigeration function setting] _normal
            (ja: 通常冷蔵, en: Normal operation) quick (ja: 急速冷蔵, en: Quick refrigeration)
            standby (ja: 急速冷蔵待機, en: Standby for quick refrigeration) '
        icemaker:
          type: string
          enum:
          - enable
          - disable
          - standby
          description: '[ja: 製氷許可設定, en: Icemaker setting] _enable (ja: 製氷許可, en:
            Enable icemaker) disable (ja: 製氷禁止, en: Disable icemaker) standby (ja:
            製氷一定時間禁止, en: Temporarily disable icemaker) '
        icemakerStatus:
          type: string
          enum:
          - running
          - stopped
          description: '[ja: 製氷動作状態, en: Icemaker operation status] _running (ja:
            運転中, en: Ice-making in progress) stopped (ja: 停止中, en: Ice-making stopped.) '
        icemakerTankStatus:
          type: string
          enum:
          - normal
          - warning
          description: '[ja: 製氷用給水タンク状態, en: Icemaker tank status] _normal (ja: タンク水あり,
            en: Icemaker tank contains water.) warning (ja: タンクなし or 水なし, en: There
            is no water left in the icemaker tank or the icemaker tank has not been
            positioned correctly in the refrigerator.) '
        refrigeratorHumidification:
          type: string
          enum:
          - 'on'
          - 'off'
          description: '[ja: 冷蔵室加湿動作設定, en: Refrigerator compartment humidification
            function setting] _on (ja: 加湿ON, en: ON) off (ja: 加湿OFF, en: OFF) '
        vegetableHumidification:
          type: string
          enum:
          - 'on'
          - 'off'
          description: '[ja: 野菜室加湿動作設定, en: Vegetable compartment humidification function
            setting] _on (ja: 加湿ON, en: ON) off (ja: 加湿OFF, en: OFF) '
        deodorization:
          type: string
          enum:
          - 'on'
          - 'off'
          description: '[ja: 脱臭動作設定, en: Deodorization function setting] _on (ja:
            脱臭ON, en: ON) off (ja: 脱臭OFF, en: OFF) '
        doorOpenCloseStatus:
          type: string
          enum:
          - anyOpen
          - allClose
          description: '[ja: ドア開閉状態, en: Door open/close status] _anyOpen (ja: ドア開,
            en: Door open) allClose (ja: ドア閉, en: Door close) '
        doorOpenWarning:
          type: boolean
          description: '[ja: ドア開放警告状態, en: Door open warning] _True (ja: ドア開放警告有,
            en: Door open warning found) False (ja: ドア開放警告無, en: Door open warning
            not found) '
        refrigeratorCompartmentDoorStatus:
          type: string
          enum:
          - open
          - close
          description: '[ja: 冷蔵室ドア開閉状態, en: Refrigerator compartment door status]
            _open (ja: ドア開, en: Open) close (ja: ドア閉, en: Closed) '
        freezerCompartmentDoorStatus:
          type: string
          enum:
          - open
          - close
          description: '[ja: 冷凍室ドア開閉状態, en: Freezer compartment door status] _open
            (ja: ドア開, en: Open) close (ja: ドア閉, en: Closed) '
        iceCompartmentDoorStatus:
          type: string
          enum:
          - open
          - close
          description: '[ja: 氷温室ドア開閉状態, en: Ice compartment door status] _open (ja:
            ドア開, en: Open) close (ja: ドア閉, en: Closed) '
        vegetableCompartmentDoorStatus:
          type: string
          enum:
          - open
          - close
          description: '[ja: 野菜室ドア開閉状態, en: Vegetable compartment door status] _open
            (ja: ドア開, en: Open) close (ja: ドア閉, en: Closed) '
        multiModeCompartmentDoorStatus:
          type: string
          enum:
          - open
          - close
          description: '[ja: 切換室ドア開閉状態, en: Multi-refrigerating mode compartment door
            status] _open (ja: ドア開, en: Open) close (ja: ドア閉, en: Closed) '
        measuredRefrigeratorTemperature:
          type: number
          minimum: -127
          maximum: 126
          description: '[ja: 冷蔵室温度計測値, en: Measured refrigerator compartment temperature] '
        measuredFreezerTemperature:
          type: number
          minimum: -127
          maximum: 126
          description: '[ja: 冷凍室温度計測値, en: Measured freezer compartment temperature] '
        measuredIceTemperature:
          type: number
          minimum: -127
          maximum: 126
          description: '[ja: 氷温室温度計測値, en: Measured subzero-fresh compartment temperature] '
        measuredVegetableTemperature:
          type: number
          minimum: -127
          maximum: 126
          description: '[ja: 野菜室温度計測値, en: Measured vegetable compartment temperature] '
        measuredMultiModeTemperature:
          type: number
          minimum: -127
          maximum: 126
          description: '[ja: 切換室温度計測値, en: Measured multi-refrigerating mode compartment
            temperature] '
        compressorRotationSpeed:
          type: object
          properties:
            maximumRotationSpeed:
              type: number
              minimum: 1
              maximum: 255
              description: '[ja: 最大回転数レベル, en: Maximum rotation speed level] _'
            rotationSpeed:
              type: number
              minimum: 0
              maximum: 255
              description: '[ja: 回転数レベル(0は停止を示す), en: Rotation speed level(Value 0
                represents Stop)] _'
          description: '[ja: 圧縮機回転数レベル, en: Compressor rotation speed] '
        electricCurrentConsumption:
          type: number
          minimum: 0
          maximum: 6553.3
          multipleOf: 0.1
          description: '[ja: 消費電流計測値, en: Measured electric current consumption] '
        ratedPowerConsumption:
          type: number
          minimum: 0
          maximum: 65533
          description: '[ja: 定格消費電力値, en: Rated power consumption] '
        maximumAllowableTemperatureLevel:
          type: object
          properties:
            refrigeratorCompartmentLevel:
              type: number
              minimum: 0
              maximum: 255
              description: '[ja: 冷蔵室, en: Refrigerator compartment] _'
            freezerCompartmentLevel:
              type: number
              minimum: 0
              maximum: 255
              description: '[ja: 冷凍室, en: Freezer compartment] _'
            iceCompartmentLevel:
              type: number
              minimum: 0
              maximum: 255
              description: '[ja: 氷温室, en: Subzero-fresh compartment] _'
            vegetableCompartmentLevel:
              type: number
              minimum: 0
              maximum: 255
              description: '[ja: 野菜室, en: Vegetable compartment] _'
            multiModeCompartmentLevel:
              type: number
              minimum: 0
              maximum: 255
              description: '[ja: 切換室, en: Multi-refrigerating mode compartment] _'
          description: '[ja: 設定可能温度レベル最大値, en: Maximum allowable temperature setting
            level] '
        refrigeratorTemperature:
          type: number
          minimum: -127
          maximum: 126
          description: '[ja: 冷蔵室温度設定値, en: Refrigerator compartment temperature setting] '
        freezerTemperature:
